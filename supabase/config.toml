# Configuracion del CLI de Supabase para desarrollo local.
# Permite: supabase start, supabase db reset (migraciones + seed) y supabase db push.
# El id debe ser unico por proyecto; cambialo si chocara con otro proyecto local.
project_id = "control-acceso-trenova"

[api]
enabled = true
port = 54321
schemas = ["public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[db.seed]
enabled = true
sql_paths = ["./seed.sql"]

[studio]
enabled = true
port = 54323

[inbucket]
enabled = true
port = 54324

[auth]
enabled = true
# URL del sitio para enlaces de recuperacion / magic link en local.
site_url = "http://localhost:3000"
additional_redirect_urls = ["http://localhost:3000/auth/callback"]
jwt_expiry = 3600
enable_signup = true

[auth.email]
enable_signup = true
enable_confirmations = false
